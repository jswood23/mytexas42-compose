version: '3.9'
services:
  db-staging:
    container_name: container-pg-staging
    build: ./postgres-build
    hostname: ${HOST_NAME}
    env_file:
      - path: ./.env
        required: true
    ports:
      - ${POSTGRES_STAGING_PORT}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  db-production:
    container_name: container-pg-production
    build: ./postgres-build
    hostname: ${HOST_NAME}
    env_file:
      - path: ./.env
        required: true
    ports:
      - ${POSTGRES_PRODUCTION_PORT}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  backend-staging:
    container_name: container-backend-staging
    build: ${BACKEND_STAGING_REPO}
    hostname: ${HOST_NAME}
    env_file:
      - path: ./.env
        required: true
    environment:
      - ENVIRONMENT=staging
    ports:
      - ${BACKEND_STAGING_PORT}:8080
    restart: unless-stopped
  backend-production:
    container_name: container-backend-production
    build: ${BACKEND_PRODUCTION_REPO}
    hostname: ${HOST_NAME}
    env_file:
      - path: ./.env
        required: true
    environment:
      - ENVIRONMENT=production
    ports:
      - ${BACKEND_PRODUCTION_PORT}:8080
    restart: unless-stopped
  

volumes:
  postgres-data: