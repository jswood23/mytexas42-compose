# nginx/nginx.conf
user  nginx;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name mytexas42.com www.mytexas42.com;
        return 301 https://$host$request_uri;
    }

    server {
            listen 80;
            server_name mytexas42.com www.mytexas42.com app.mytexas42.com staging-app.mytexas42.com api.mytexas42.com staging-api.mytexas42.com;

            location ^~ /.well-known/acme-challenge/ {
                root /var/www/html;
                try_files $uri =404;
            }

            # Redirect all HTTP traffic to HTTPS
            location / {
                return 301 https://$host$request_uri;
            }
        }

        # Server block for HTTPS content
        server {
            listen 443 ssl;
            server_name mytexas42.com www.mytexas42.com;

            ssl_certificate /etc/letsencrypt/live/mytexas42.com/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/mytexas42.com/privkey.pem;

            location / {
                proxy_pass http://frontend-production:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }

    server {
        listen       80;
        server_name  app.mytexas42.com;

        location / {
            proxy_pass http://frontend-production:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       80;
        server_name  staging-app.mytexas42.com;

        location / {
            proxy_pass http://frontend-staging:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       80;
        server_name  api.mytexas42.com;

        location / {
            proxy_pass http://backend-production:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       80;
        server_name  staging-api.mytexas42.com;

        location / {
            proxy_pass http://backend-staging:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}